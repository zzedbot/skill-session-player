<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📼 OpenClaw 会话录制库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .recordings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .recording-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .recording-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #00d9ff;
            transform: translateY(-2px);
        }

        .recording-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .recording-icon {
            font-size: 2rem;
        }

        .recording-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .recording-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
            color: #888;
        }

        .meta-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .play-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #888;
        }

        .refresh-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <button class="refresh-btn" onclick="loadRecordings()" title="刷新">🔄</button>
    
    <div class="container">
        <header>
            <h1>📼 OpenClaw 会话录制库</h1>
            <p class="subtitle">查看和回放你的 AI 会话记录</p>
        </header>

        <div id="recordings-grid" class="recordings-grid">
            <div class="loading">正在加载录制文件...</div>
        </div>
    </div>

    <script>
        async function loadRecordings() {
            const grid = document.getElementById('recordings-grid');
            grid.innerHTML = '<div class="loading">正在加载录制文件...</div>';

            try {
                const response = await fetch('/session-player/api/recordings');
                const data = await response.json();

                if (!data.success || data.recordings.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📼</div>
                            <h2>暂无录制文件</h2>
                            <p>会话录制将显示在这里</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = data.recordings.map(rec => `
                    <div class="recording-card" onclick="window.location.href='/session-player/player/${rec.filename}'">
                        <div class="recording-header">
                            <span class="recording-icon">🎬</span>
                        </div>
                        <div class="recording-name">${rec.name}</div>
                        <div class="recording-meta">
                            <span class="meta-item">📅 ${new Date(rec.createdAt).toLocaleDateString('zh-CN')}</span>
                            <span class="meta-item">⏰ ${new Date(rec.createdAt).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'})}</span>
                            <span class="meta-item">💬 ${rec.messageCount} 条消息</span>
                            <span class="meta-item">🤖 ${rec.recordingInfo?.model || '未知'}</span>
                        </div>
                        <a href="/session-player/player/${rec.filename}" class="play-btn">▶️ 播放</a>
                    </div>
                `).join('');

            } catch (error) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <h2>加载失败</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        loadRecordings();
    </script>
</body>
</html>
