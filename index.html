<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📼 OpenClaw 会话录制库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .recordings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .recording-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .recording-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #00d9ff;
            transform: translateY(-2px);
        }

        .recording-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .recording-icon {
            font-size: 2rem;
        }

        .recording-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .recording-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
            color: #888;
        }

        .meta-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .play-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #888;
        }

        .refresh-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ===== 重命名功能样式 ===== */
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .action-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00d9ff;
        }

        .action-btn.rename-btn {
            background: rgba(0, 217, 255, 0.2);
            border-color: rgba(0, 217, 255, 0.4);
        }

        .action-btn.rename-btn:hover {
            background: rgba(0, 217, 255, 0.3);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #fff;
        }

        .modal-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-btn.confirm {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }

        .modal-btn.confirm:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }
    </style>
</head>
<body>
    <button class="refresh-btn" onclick="loadRecordings()" title="刷新">🔄</button>
    
    <!-- 重命名对话框 -->
    <div class="modal-overlay" id="rename-modal">
        <div class="modal">
            <h3 class="modal-title">📝 重命名会话</h3>
            <input type="text" class="modal-input" id="rename-input" placeholder="输入新名称">
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeRenameModal()">取消</button>
                <button class="modal-btn confirm" onclick="confirmRename()">确认</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <header>
            <h1>📼 OpenClaw 会话录制库</h1>
            <p class="subtitle">查看和回放你的 AI 会话记录</p>
        </header>

        <div id="recordings-grid" class="recordings-grid">
            <div class="loading">正在加载录制文件...</div>
        </div>
    </div>

    <script>
        async function loadRecordings() {
            const grid = document.getElementById('recordings-grid');
            grid.innerHTML = '<div class="loading">正在加载录制文件...</div>';

            try {
                const response = await fetch('/session-player/api/recordings');
                const data = await response.json();

                if (!data.success || data.recordings.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📼</div>
                            <h2>暂无录制文件</h2>
                            <p>会话录制将显示在这里</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = data.recordings.map(rec => `
                    <div class="recording-card" onclick="event.target.tagName !== 'BUTTON' && (window.location.href='/session-player/player/${rec.filename}')">
                        <div class="recording-header">
                            <span class="recording-icon">🎬</span>
                        </div>
                        <div class="recording-name">${rec.name}</div>
                        <div class="recording-meta">
                            <span class="meta-item">📅 ${new Date(rec.createdAt).toLocaleDateString('zh-CN')}</span>
                            <span class="meta-item">⏰ ${new Date(rec.createdAt).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'})}</span>
                            <span class="meta-item">💬 ${rec.messageCount} 条消息</span>
                            <span class="meta-item">🤖 ${rec.recordingInfo?.model || '未知'}</span>
                        </div>
                        <div class="card-actions">
                            <a href="/session-player/player/${rec.filename}" class="action-btn">▶️ 播放</a>
                            <button class="action-btn rename-btn" onclick="openRenameModal('${rec.filename}', '${rec.name}')">✏️ 重命名</button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <h2>加载失败</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        loadRecordings();

        // ===== 重命名功能 =====
        let currentFilename = null;

        function openRenameModal(filename, name) {
            event.stopPropagation(); // 阻止卡片点击事件
            currentFilename = filename;
            const modal = document.getElementById('rename-modal');
            const input = document.getElementById('rename-input');
            input.value = name.replace('.json', '');
            modal.classList.add('show');
            input.focus();
        }

        function closeRenameModal() {
            const modal = document.getElementById('rename-modal');
            modal.classList.remove('show');
            currentFilename = null;
        }

        async function confirmRename() {
            const input = document.getElementById('rename-input');
            const newName = input.value.trim();

            if (!newName) {
                alert('请输入文件名');
                return;
            }

            try {
                const response = await fetch('/session-player/api/recordings/rename', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filename: currentFilename,
                        newName: newName.endsWith('.json') ? newName : newName + '.json'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert('重命名成功！');
                    closeRenameModal();
                    loadRecordings(); // 重新加载列表
                } else {
                    alert('重命名失败：' + result.error);
                }
            } catch (error) {
                alert('重命名失败：' + error.message);
            }
        }

        // 回车键确认重命名
        document.getElementById('rename-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                confirmRename();
            }
        });
    </script>
</body>
</html>
