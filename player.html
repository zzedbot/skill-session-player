<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 会话播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 100vh;
            overflow: hidden;
            color: #e0e0e0;
        }

        /* ===== 固定头部工具栏 ===== */
        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .session-title {
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .toolbar-center {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .control-btn.active {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            border-color: transparent;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .speed-selector {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 15px;
            padding-left: 15px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .speed-selector span {
            color: #888;
            font-size: 0.85rem;
        }

        .speed-btn {
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .playing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            background: rgba(0, 255, 136, 0.2);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #00ff88;
        }

        .playing-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== 聊天式消息区域 ===== */
        .chat-container {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
        }

        /* 消息气泡样式 */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .message.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 用户消息 - 右侧 */
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        /* 助手消息 - 左侧 */
        .message.assistant {
            align-self: flex-start;
        }

        /* 工具消息 - 左侧，较小 */
        .message.tool {
            align-self: flex-start;
            max-width: 70%;
        }

        /* 思考消息 - 居中，半透明 */
        .message.thinking {
            align-self: center;
            max-width: 90%;
            background: rgba(136, 136, 136, 0.1) !important;
            border: 1px dashed rgba(136, 136, 136, 0.3) !important;
        }

        /* 头像 */
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #00d9ff, #0099cc);
        }

        .message.assistant .avatar {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
        }

        .message.tool .avatar {
            background: linear-gradient(135deg, #ffcc00, #cc9900);
        }

        .message.thinking .avatar {
            background: linear-gradient(135deg, #888, #666);
        }

        /* 消息内容气泡 */
        .message-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(0, 153, 204, 0.2));
            border-color: rgba(0, 217, 255, 0.3);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: rgba(255, 255, 255, 0.08);
            border-bottom-left-radius: 4px;
        }

        .message.tool .message-bubble {
            background: rgba(255, 204, 0, 0.1);
            border-color: rgba(255, 204, 0, 0.3);
            font-size: 0.9rem;
        }

        .message.thinking .message-bubble {
            color: #888;
            font-style: italic;
            font-size: 0.9rem;
        }

        /* 消息头部信息 */
        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #666;
            padding: 0 4px;
        }

        .message.user .message-meta {
            justify-content: flex-end;
        }

        .role-label {
            font-weight: 600;
        }

        .message.user .role-label { color: #00d9ff; }
        .message.assistant .role-label { color: #00ff88; }
        .message.tool .role-label { color: #ffcc00; }
        .message.thinking .role-label { color: #888; }

        /* 消息文本内容 */
        .message-text {
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.thinking .message-text {
            color: #888;
        }

        /* 工具名称标签 */
        .tool-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255, 204, 0, 0.2);
            border-radius: 12px;
            font-size: 0.75rem;
            color: #ffcc00;
            margin-left: 8px;
        }

        /* ===== 折叠功能样式 ===== */
        .collapsible-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 85%;
        }

        .collapsible-group.assistant-group {
            align-self: flex-start;
        }

        .collapsible-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .collapsible-header:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 217, 255, 0.3);
        }

        .collapsible-header.expanded {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .collapse-icon {
            font-size: 0.9rem;
            transition: transform 0.3s ease;
        }

        .collapse-icon.rotated {
            transform: rotate(90deg);
        }

        .collapse-summary {
            flex: 1;
            font-size: 0.85rem;
            color: #aaa;
        }

        .collapse-summary strong {
            color: #00ff88;
        }

        .collapse-count {
            padding: 2px 8px;
            background: rgba(0, 217, 255, 0.2);
            border-radius: 10px;
            font-size: 0.75rem;
            color: #00d9ff;
        }

        .collapsible-content {
            display: none;
            flex-direction: column;
            gap: 16px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: none;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .collapsible-content.show {
            display: flex;
        }

        .collapsible-content .message {
            max-width: 100%;
        }

        .collapsible-content .message-bubble {
            background: rgba(255, 255, 255, 0.05);
        }

        /* ===== 进度条 ===== */
        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1001;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* ===== 加载和错误状态 ===== */
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #888;
        }

        .error-state {
            text-align: center;
            padding: 60px;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        /* ===== 滚动条样式 ===== */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ===== 响应式设计 ===== */
        @media (max-width: 768px) {
            .toolbar {
                padding: 0 10px;
                height: 60px;
            }

            .toolbar-center {
                display: none;
            }

            .session-title {
                max-width: 150px;
                font-size: 0.95rem;
            }

            .chat-container {
                top: 60px;
            }

            .message {
                max-width: 95%;
            }

            .speed-selector {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 固定头部工具栏 -->
    <div class="toolbar">
        <div class="toolbar-left">
            <a href="/" class="back-btn" id="back-link">← 返回</a>
            <span class="session-title" id="page-title">🎬 会话播放器</span>
        </div>

        <div class="toolbar-center">
            <button class="control-btn" id="play-btn" onclick="togglePlay()">
                <span>▶️</span> <span>播放</span>
            </button>
            <button class="control-btn" onclick="loadAll()">
                <span>⏩</span> <span>全部加载</span>
            </button>
            <button class="control-btn" onclick="reset()">
                <span>⏮️</span> <span>重置</span>
            </button>
            <button class="control-btn" onclick="skipForward()">
                <span>⏭️</span> <span>跳过</span>
            </button>

            <div class="speed-selector">
                <span>速度:</span>
                <button class="control-btn speed-btn" onclick="setSpeed(0.5)">0.5x</button>
                <button class="control-btn speed-btn active" onclick="setSpeed(1)">1x</button>
                <button class="control-btn speed-btn" onclick="setSpeed(2)">2x</button>
                <button class="control-btn speed-btn" onclick="setSpeed(5)">5x</button>
            </div>
        </div>

        <div class="toolbar-right">
            <div id="playing-status"></div>
        </div>
    </div>

    <!-- 聊天式消息区域 -->
    <div class="chat-container">
        <div class="chat-wrapper" id="messages-container">
            <div class="loading">正在加载会话...</div>
        </div>
    </div>

    <!-- 进度条 -->
    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <script>
        let recording = null;
        let currentIndex = 0;
        let isPlaying = false;
        let playInterval = null;
        let speed = 1;
        let collapsedGroups = new Set(); // 记录折叠的组 ID

        // 自动检测 API 基础路径
        function getApiBase() {
            const path = window.location.pathname;
            if (path.includes('/session-player/')) {
                return '/session-player';
            }
            return '';
        }

        const API_BASE = getApiBase();
        
        // 从路径中提取分类和文件名
        // 路径格式：/session-player/player/:category/:filename
        const pathParts = window.location.pathname.split('/').filter(p => p);
        const filename = pathParts.pop(); // 最后一部分是文件名
        const category = pathParts.pop() || 'uncategorized'; // 倒数第二部分是分类
        
        const roleConfig = {
            user: { 
                icon: '👤', 
                label: '你', 
                class: 'user',
                align: 'right'
            },
            assistant: { 
                icon: '🤖', 
                label: '助手', 
                class: 'assistant',
                align: 'left'
            },
            tool: { 
                icon: '🔧', 
                label: '工具', 
                class: 'tool',
                align: 'left'
            },
            thinking: { 
                icon: '💭', 
                label: '思考', 
                class: 'thinking',
                align: 'center'
            }
        };

        async function loadRecording() {
            try {
                // 从元数据 API 获取录制信息（支持分类目录）
                const response = await fetch(`${API_BASE}/api/recordings`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error);
                }

                // 查找匹配的录制文件
                const recordingData = data.recordings.find(r => r.filename === filename);
                
                if (!recordingData) {
                    throw new Error(`文件 "${filename}" 不存在`);
                }

                // 从实际文件加载完整内容
                const fileResponse = await fetch(`${API_BASE}/api/recordings/${filename}`);
                const fileData = await fileResponse.json();
                
                if (!fileData.success) {
                    throw new Error(fileData.error);
                }

                recording = fileData.recording;
                const title = recording.recordingInfo?.title || recordingData.name || filename.replace('.json', '');
                document.getElementById('page-title').textContent = `🎬 ${title}`;
                renderMessages();

            } catch (error) {
                document.getElementById('messages-container').innerHTML = `
                    <div class="error-state">
                        <div class="error-icon">❌</div>
                        <h2>加载失败</h2>
                        <p>${error.message}</p>
                        <a href="${API_BASE}/" class="back-btn" style="display: inline-block; margin-top: 20px;">返回录制库</a>
                    </div>
                `;
            }
        }

        function renderMessages() {
            const container = document.getElementById('messages-container');
            
            // 将消息分组：助手（思考/工具调用）+ 后续的工具结果归为一组
            const groups = [];
            let currentGroup = null;
            let inAssistantSequence = false;
            
            // 先清空折叠组记录（重新渲染时重建）
            const previousCollapsed = new Set(collapsedGroups);
            collapsedGroups.clear();
            
            recording.messages.forEach((msg, index) => {
                // 跳过没有内容的消息
                if (!msg.content && !msg.toolName) return;
                
                const isThinking = msg.type === 'thinking';
                const isToolCall = msg.type === 'toolCall';
                const isToolResult = msg.role === 'tool';
                const isUser = msg.role === 'user';
                
                // 用户消息 - 总是单独成组
                if (isUser) {
                    if (currentGroup) {
                        groups.push(currentGroup);
                        currentGroup = null;
                    }
                    inAssistantSequence = false;
                    groups.push({
                        startIndex: index,
                        messages: [{...msg, index, isUser: true}],
                        isUser: true
                    });
                    return;
                }
                
                // 助手消息（思考/工具调用）- 开始或延续助手序列
                if (isThinking || isToolCall) {
                    if (!inAssistantSequence) {
                        // 开始新的助手序列
                        if (currentGroup) {
                            groups.push(currentGroup);
                        }
                        currentGroup = {
                            startIndex: index,
                            messages: [{...msg, index, isThinking, isToolCall, isToolResult}],
                            thinkingCount: isThinking ? 1 : 0,
                            toolCallCount: isToolCall ? 1 : 0,
                            toolResultCount: 0
                        };
                        inAssistantSequence = true;
                    } else {
                        // 延续当前助手序列
                        currentGroup.messages.push({...msg, index, isThinking, isToolCall, isToolResult});
                        if (isThinking) currentGroup.thinkingCount++;
                        if (isToolCall) currentGroup.toolCallCount++;
                    }
                    return;
                }
                
                // 工具结果 - 添加到当前助手序列
                if (isToolResult && inAssistantSequence) {
                    currentGroup.messages.push({...msg, index, isThinking, isToolCall, isToolResult});
                    currentGroup.toolResultCount++;
                    return;
                }
                
                // 其他助手消息（普通回复）
                if (msg.role === 'assistant') {
                    if (currentGroup) {
                        groups.push(currentGroup);
                    }
                    currentGroup = {
                        startIndex: index,
                        messages: [{...msg, index, isThinking: false, isToolCall: false, isToolResult: false}],
                        thinkingCount: 0,
                        toolCallCount: 0,
                        toolResultCount: 0
                    };
                    inAssistantSequence = true;
                }
            });
            
            if (currentGroup) {
                groups.push(currentGroup);
            }
            
            // 默认折叠所有可折叠的助手组（除非之前是展开的）
            groups.forEach((group, groupIndex) => {
                const groupId = `group-${groupIndex}`;
                const isExpandable = group.messages.length > 1 && !group.isUser;
                if (isExpandable) {
                    // 默认折叠，除非之前用户手动展开过
                    if (!previousCollapsed.has(groupId)) {
                        collapsedGroups.add(groupId);
                    }
                }
            });
            
            // 渲染分组 - 初始时所有内容都隐藏，等待播放时逐个显示
            container.innerHTML = groups.map((group, groupIndex) => {
                const firstMsg = group.messages[0];
                const isExpandable = group.messages.length > 1 && !group.isUser;
                const groupId = `group-${groupIndex}`;
                const isCollapsed = collapsedGroups.has(groupId);
                
                // 单条消息或用户消息 - 直接渲染（初始隐藏）
                if (!isExpandable) {
                    const config = firstMsg.isUser ? roleConfig.user : roleConfig.assistant;
                    return `<div style="display:none;" data-group-id="${groupId}">${renderMessage(firstMsg, config, firstMsg.isUser)}</div>`;
                }
                
                // 可折叠的助手组 - 初始隐藏整个组
                const summaryText = buildSummary(group);
                
                return `
                    <div class="collapsible-group assistant-group" id="${groupId}" style="display:none;" data-group-id="${groupId}">
                        <div class="collapsible-header ${isCollapsed ? '' : 'expanded'}" onclick="toggleCollapse('${groupId}')" style="display:none;">
                            <span class="collapse-icon ${isCollapsed ? '' : 'rotated'}">▶</span>
                            <span class="collapse-summary">${summaryText}</span>
                            <span class="collapse-count">${group.messages.length} 条消息</span>
                        </div>
                        <div class="collapsible-content ${isCollapsed ? '' : 'show'}" id="${groupId}-content">
                            ${group.messages.map(m => {
                                let role = 'assistant';
                                if (m.isUser) role = 'user';
                                else if (m.isToolResult) role = 'tool';
                                return renderMessage(m, roleConfig[role], m.isUser);
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function buildSummary(group) {
            const firstMsg = group.messages[0];
            const time = new Date(firstMsg.timestamp).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
            let summary = `<strong>助手</strong> 在 ${time}`;
            
            if (firstMsg.toolName) {
                summary += ` 调用了 <span class="tool-tag">${firstMsg.toolName}</span>`;
            }
            
            if (group.toolCallCount > 0) {
                summary += `，调用 ${group.toolCallCount} 次工具`;
            }
            
            if (group.toolResultCount > 0) {
                summary += `，执行 ${group.toolResultCount} 个结果`;
            }
            
            if (group.thinkingCount > 0) {
                summary += `，思考 ${group.thinkingCount} 次`;
            }
            
            return summary;
        }
        
        function renderMessage(msg, config, isUser = false) {
            const time = new Date(msg.timestamp).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
            const displayType = msg.isThinking ? 'thinking' : (msg.isToolCall ? 'toolCall' : 'text');
            const showToolTag = msg.toolName && !msg.isToolResult;
            
            return `
                <div class="message ${config.class}" id="message-${msg.index}" data-index="${msg.index}">
                    <div class="avatar">${config.icon}</div>
                    <div class="message-content-wrapper">
                        <div class="message-meta">
                            <span class="role-label">${config.label}</span>
                            ${showToolTag ? `<span class="tool-tag">${msg.toolName}</span>` : ''}
                            ${msg.isToolResult ? '<span>• 工具结果</span>' : ''}
                            ${!msg.isThinking && !msg.isToolCall && !msg.isToolResult ? '<span>• 回复</span>' : ''}
                            <span>•</span>
                            <span>${time}</span>
                        </div>
                        <div class="message-bubble">
                            <div class="message-text ${msg.isThinking ? 'thinking' : ''}">${escapeHtml(msg.content || '')}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function toggleCollapse(groupId) {
            // 只切换当前点击的组，不重新渲染所有内容
            const groupContainer = document.getElementById(groupId);
            if (!groupContainer) return;
            
            const header = groupContainer.querySelector('.collapsible-header');
            const content = groupContainer.querySelector('.collapsible-content');
            const icon = groupContainer.querySelector('.collapse-icon');
            
            if (collapsedGroups.has(groupId)) {
                // 当前是折叠状态，现在展开
                collapsedGroups.delete(groupId);
                
                // 更新 UI
                if (content) content.classList.add('show');
                if (icon) icon.classList.add('rotated');
                if (header) header.classList.add('expanded');
            } else {
                // 当前是展开状态，现在折叠
                collapsedGroups.add(groupId);
                
                // 更新 UI
                if (content) content.classList.remove('show');
                if (icon) icon.classList.remove('rotated');
                if (header) header.classList.remove('expanded');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showMessage(index) {
            // 找到当前消息所在的组
            const msgElement = document.querySelector(`[data-index="${index}"]`);
            if (!msgElement) return;
            
            // 查找该消息所属的组容器
            const groupContainer = msgElement.closest('.collapsible-group') || msgElement.closest('[data-group-id]');
            
            if (groupContainer) {
                const groupId = groupContainer.id || groupContainer.getAttribute('data-group-id');
                
                // 如果是折叠组且还未显示，显示组容器和折叠头（保持折叠状态）
                if (groupContainer.style.display === 'none') {
                    groupContainer.style.display = 'flex';
                    
                    // 显示折叠头
                    const header = groupContainer.querySelector('.collapsible-header');
                    if (header) header.style.display = 'flex';
                    
                    // 保持折叠状态，不展开内容
                    // 用户需要手动点击折叠头来展开查看详细内容
                }
                
                // 对于非折叠组的单条消息，直接显示容器
                if (!groupContainer.classList.contains('collapsible-group')) {
                    groupContainer.style.display = 'block';
                }
            }
            
            // 等待 DOM 更新后显示消息
            setTimeout(() => {
                const msg = document.getElementById(`message-${index}`);
                if (msg) {
                    msg.classList.add('visible');
                    msg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 50);
            
            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / recording.messages.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        function play() {
            if (currentIndex >= recording.messages.length) {
                currentIndex = 0;
            }

            isPlaying = true;
            const playBtn = document.getElementById('play-btn');
            playBtn.innerHTML = '<span>⏸️</span> <span>暂停</span>';
            playBtn.classList.add('active');
            
            document.getElementById('playing-status').innerHTML = `
                <span class="playing-indicator">
                    <span class="playing-dot"></span>
                    播放中
                </span>
            `;

            const baseInterval = 1500 / speed;

            const playStep = () => {
                if (!isPlaying || currentIndex >= recording.messages.length) {
                    if (currentIndex >= recording.messages.length) {
                        pause();
                    }
                    return;
                }

                // 检查当前消息是否属于可折叠的助手组（无论当前是否展开）
                const msgElement = document.querySelector(`[data-index="${currentIndex}"]`);
                const groupContainer = msgElement?.closest('.collapsible-group');
                // 只要是可折叠的组（有多个消息），就使用 3 倍速
                const isFastForwardGroup = groupContainer !== null;
                
                // 如果在可折叠组内，使用 3 倍速
                const currentInterval = isFastForwardGroup ? baseInterval / 3 : baseInterval;
                
                showMessage(currentIndex);
                currentIndex++;
                
                // 重新设置定时器以支持动态变速
                clearInterval(playInterval);
                playInterval = setInterval(playStep, currentInterval);
            };

            playInterval = setInterval(playStep, baseInterval);
        }

        function pause() {
            isPlaying = false;
            clearInterval(playInterval);
            const playBtn = document.getElementById('play-btn');
            playBtn.innerHTML = '<span>▶️</span> <span>播放</span>';
            playBtn.classList.remove('active');
            document.getElementById('playing-status').innerHTML = '';
        }

        function reset() {
            pause();
            currentIndex = 0;
            // 隐藏所有消息
            document.querySelectorAll('.message').forEach(msg => {
                msg.classList.remove('visible');
            });
            // 隐藏所有组容器
            document.querySelectorAll('[data-group-id]').forEach(group => {
                group.style.display = 'none';
                // 如果是折叠组，也隐藏折叠头
                const header = group.querySelector('.collapsible-header');
                if (header) header.style.display = 'none';
            });
            updateProgress();
            // 滚动到顶部
            document.querySelector('.chat-container').scrollTop = 0;
        }

        function loadAll() {
            // 暂停播放
            pause();
            
            // 显示所有组容器和折叠头
            document.querySelectorAll('[data-group-id]').forEach(group => {
                group.style.display = 'flex';
                const header = group.querySelector('.collapsible-header');
                if (header) header.style.display = 'flex';
            });
            
            // 显示所有消息
            document.querySelectorAll('.message').forEach(msg => {
                msg.classList.add('visible');
            });
            
            // 更新当前索引到最后
            currentIndex = recording.messages.length;
            updateProgress();
            
            // 滚动到顶部
            document.querySelector('.chat-container').scrollTop = 0;
        }

        function skipForward() {
            const skipCount = Math.ceil(5 * speed);
            for (let i = 0; i < skipCount && currentIndex < recording.messages.length; i++) {
                showMessage(currentIndex);
                currentIndex++;
            }
        }

        function setSpeed(newSpeed) {
            speed = newSpeed;
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            if (isPlaying) {
                pause();
                play();
            }
        }

        // 初始化
        document.getElementById('back-link').href = `${API_BASE}/`;
        loadRecording();

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            // 如果焦点在输入框中，不处理快捷键
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                return;
            }
            
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'KeyR') {
                reset();
            } else if (e.code === 'KeyL') {
                loadAll();
            } else if (e.code === 'ArrowRight') {
                skipForward();
            }
        });
    </script>
</body>
</html>
