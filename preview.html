<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 脱敏预览 - Session Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .controls select {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            min-width: 200px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
        }

        .preview-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .original .panel-title {
            color: #ff6b6b;
        }

        .redacted .panel-title {
            color: #00ff88;
        }

        .content {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .highlight {
            background: rgba(255, 215, 0, 0.3);
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 600;
        }

        .stats {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .stats-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #00d9ff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00ff88;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #888;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 脱敏预览</h1>
            <p>对比原版和脱敏版，查看脱敏效果</p>
        </header>

        <div class="controls">
            <select id="file-selector" onchange="loadPreview()">
                <option value="">选择录制文件...</option>
            </select>
            <a href="/session-player/" class="btn btn-secondary">← 返回录制库</a>
        </div>

        <div id="stats-container"></div>

        <div class="preview-grid" id="preview-grid" style="display: none;">
            <div class="preview-panel original">
                <div class="panel-header">
                    <span class="panel-title">📄 原版</span>
                    <span id="original-size"></span>
                </div>
                <div class="content" id="original-content"></div>
            </div>
            <div class="preview-panel redacted">
                <div class="panel-header">
                    <span class="panel-title">🔒 脱敏版</span>
                    <span id="redacted-size"></span>
                </div>
                <div class="content" id="redacted-content"></div>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            加载中...
        </div>
    </div>

    <script>
        const API_BASE = window.location.pathname.includes('/session-player/') ? '/session-player' : '';
        let currentFile = null;

        // 加载文件列表
        async function loadFileList() {
            try {
                const response = await fetch(`${API_BASE}/api/recordings`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error);
                }

                const selector = document.getElementById('file-selector');
                const filesWithRedacted = data.recordings.filter(r => r.redactedVersion);

                if (filesWithRedacted.length === 0) {
                    selector.innerHTML = '<option value="">暂无脱敏版本的文件</option>';
                    return;
                }

                selector.innerHTML = '<option value="">选择录制文件...</option>' +
                    filesWithRedacted.map(r => `
                        <option value="${r.filename}">${r.name} (${r.redactedVersion})</option>
                    `).join('');

            } catch (error) {
                console.error('加载文件列表失败:', error);
            }
        }

        // 加载预览
        async function loadPreview() {
            const filename = document.getElementById('file-selector').value;
            
            if (!filename) {
                document.getElementById('preview-grid').style.display = 'none';
                document.getElementById('stats-container').innerHTML = '';
                return;
            }

            currentFile = filename;
            const redactedFilename = filename.replace('-full.json', '-redacted.json');

            document.getElementById('loading').style.display = 'block';
            document.getElementById('preview-grid').style.display = 'none';
            document.getElementById('stats-container').innerHTML = '';

            try {
                // 加载原版
                const originalResponse = await fetch(`${API_BASE}/api/recordings/${filename}`);
                const originalData = await originalResponse.json();

                // 加载脱敏版
                const redactedResponse = await fetch(`${API_BASE}/api/recordings/${redactedFilename}`);
                const redactedData = await redactedResponse.json();

                if (!originalData.success || !redactedData.success) {
                    throw new Error('加载文件失败');
                }

                // 显示统计
                const originalText = JSON.stringify(originalData.recording, null, 2);
                const redactedText = JSON.stringify(redactedData.recording, null, 2);
                const stats = calculateStats(originalText, redactedText);

                displayStats(stats);

                // 显示内容
                document.getElementById('original-content').textContent = originalText.substring(0, 50000) + (originalText.length > 50000 ? '\n\n... (内容过长，已截断)' : '');
                document.getElementById('redacted-content').textContent = redactedText.substring(0, 50000) + (redactedText.length > 50000 ? '\n\n... (内容过长，已截断)' : '');

                document.getElementById('original-size').textContent = `${(originalText.length / 1024).toFixed(1)} KB`;
                document.getElementById('redacted-size').textContent = `${(redactedText.length / 1024).toFixed(1)} KB`;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('preview-grid').style.display = 'grid';

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert('加载失败：' + error.message);
            }
        }

        // 计算统计信息
        function calculateStats(original, redacted) {
            const stats = {
                originalLength: original.length,
                redactedLength: redacted.length,
                replacements: []
            };

            // 简单统计被替换的内容
            const redactedPatterns = [
                { name: '邮箱', pattern: /\[REDACTED_EMAIL\]/g },
                { name: 'API 密钥', pattern: /\[REDACTED_API_KEY\]/g },
                { name: 'Token', pattern: /\[REDACTED_(?:NPM|GITHUB|SMTP)_TOKEN\]/g },
                { name: '密码', pattern: /\[REDACTED_PASSWORD\]/g },
                { name: 'IP 地址', pattern: /\[REDACTED_IP\]/g },
                { name: '域名', pattern: /\[REDACTED_DOMAIN\]/g }
            ];

            for (const { name, pattern } of redactedPatterns) {
                const matches = redacted.match(pattern);
                if (matches) {
                    stats.replacements.push({
                        rule: name,
                        count: matches.length
                    });
                }
            }

            return stats;
        }

        // 显示统计
        function displayStats(stats) {
            const container = document.getElementById('stats-container');
            
            let html = `
                <div class="stats">
                    <div class="stats-title">📊 脱敏统计</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${stats.replacements.reduce((sum, r) => sum + r.count, 0)}</div>
                            <div class="stat-label">总脱敏数</div>
                        </div>
            `;

            for (const stat of stats.replacements) {
                html += `
                    <div class="stat-item">
                        <div class="stat-value">${stat.count}</div>
                        <div class="stat-label">${stat.rule}</div>
                    </div>
                `;
            }

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // 初始化
        loadFileList();
    </script>
</body>
</html>
